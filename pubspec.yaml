name: ydart
description: >
  Flutter Android/iOS bindings for yrs (y-crdt), the Rust port of Yjs.
  Provides CRDT-based shared data types for building collaborative,
  offline-first mobile applications. Port of YDotNet.
version: 0.1.0
homepage: https://github.com/Knaackee/ydart
repository: https://github.com/Knaackee/ydart
issue_tracker: https://github.com/Knaackee/ydart/issues

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  ffi: ^2.1.3

dev_dependencies:
  async: ^2.13.0
  ffigen: ^20.1.1
  test: ^1.25.8
  benchmark_harness: ^2.3.0
  lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true

ffigen:
  name: YrsBindings
  description: Generated FFI bindings for libyrs (yffi)
  output: lib/src/native/yrs_bindings_generated.dart
  headers:
    entry-points:
      - src/libyrs.h
  preamble: |
    // AUTO-GENERATED - do not edit by hand.
    // Generated by ffigen from libyrs.h (yffi crate of y-crdt).
