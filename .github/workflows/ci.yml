name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  flutter:
    name: Flutter checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ydart
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run host tests
        run: dart test

      - name: Check example app dependencies
        working-directory: example
        run: flutter pub get

      - name: Analyze example app
        working-directory: example
        run: flutter analyze

      - name: Check Yjs fixture generator
        run: |
          npm install
          npm run yjs:fixture

      - name: Pub dry run
        run: flutter pub publish --dry-run
